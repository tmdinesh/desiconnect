html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DesiConnect Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<style>
  body {
    background-color: #f8f9fa;
    font-family: Arial, sans-serif;
  }
  
  .container {
    max-width: 800px;
    margin: 40px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  }

  img {
    display: block;
    margin-left: auto;
    margin-right: auto;
    width: 20%;
  }

  .center {
    text-align: center;
    margin: auto;
    width: 50%;
    border: 3px solid grey;
    padding: 40px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    background: white;
  }

  .form-control {
    max-width: 350px;
    margin: 10px auto;
  }

  .btn {
    width: 48%;
    margin: 10px 1%;
  }

  a {
    display: inline-block;
    margin-top: 10px;
    text-decoration: none;
    color: #007bff;
    font-weight: bold;
    cursor: pointer;
  }

  a:hover {
    text-decoration: underline;
  }

  .alert {
    max-width: 350px;
    margin: 10px auto;
    text-align: center;
  }
</style>
</head>
<body>

<!-- Logo -->
<img src="https://i.imgur.com/QFeZEKy.png" alt="Logo of India Post">

<div class="center">
  <h3>DesiConnect Login</h3>
  
  <form id="loginForm">
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
      <div class="form-text"><a id="forgotPassword">Forgot Password?</a></div>
    </div>
    
    <button type="submit" class="btn btn-primary">Login</button>
  </form>
  
  <div id="message"></div>
</div>

<script>
// Hardcoded user credentials
const users = [
    { email: "admin@example.com", password: "1234" },
    { email: "john_doe@example.com", password: "password123" },
    { email: "desi_user@example.com", password: "india123" }
];

document.getElementById("loginForm").addEventListener("submit", function (event) {
    event.preventDefault();

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let messageDiv = document.getElementById("message");

    let user = users.find(user => user.email === email);

    if (!user) {
        showMessage("Account does not exist", "danger");
    } else if (user.password !== password) {
        showMessage("Incorrect password", "warning");
    } else {
        showMessage("Login Successful!", "success");
    }
});

document.getElementById("forgotPassword").addEventListener("click", function () {
    let email = document.getElementById("email").value;
    if (!email) {
        showMessage("Please enter your email first", "info");
    } else {
        showMessage("Password sent to email", "primary");
    }
});

// Function to show messages
function showMessage(text, type) {
    let messageDiv = document.getElementById("message");
    messageDiv.innerHTML = `<div class="alert alert-${type}">${text}</div>`;
    setTimeout(() => messageDiv.innerHTML = "", 3000);
}
</script>

</body>
</html>
