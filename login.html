<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DesiConnect Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
               <style>
                   body {
                       background-color: #f8f9fa;
                       font-family: Arial, sans-serif;
                   }
                   .container {
                       max-width: 800px;
                       margin: 40px auto;
                       background: white;
                       padding: 20px;
                       border-radius: 10px;
                       box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
                   }
                   .btn-primary {
                       background-color: #007bff;
                       border: none;
                       transition: background-color 0.3s ease;
                   }
                   .btn-primary:hover {
                       background-color: #0056b3;
                   }
               </style>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<style>
  
  img {
    display: block;
    margin-left: auto;
    margin-right: auto;
    width: 20%;
  }

  .center {
    text-align: center;
    margin: auto;
    width: 50%;
    border: 3px solid grey;
    padding: 40px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  }


  .center-block {
    display: block;
    margin: 0 auto;
  }


  .form-control {
    max-width: 350px;
    margin: 10px auto;
  }

  .btn {
    width: 48%;
    margin: 10px 1%;
  }

  a {
    display: inline-block;
    margin-top: 20px;
    text-decoration: none;
    color: #007bff;
    font-weight: bold;
  }

  a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>


<img src="https://i.imgur.com/QFeZEKy.png" alt="Logo of India Post">


<div class="center">
  <form>
    <div class="mb-3">
      <label for="Password" class="form-label">Password</label>
      <div class="center-block">
        <input type="password" class="form-control" id="Password" aria-describedby="emailHelp" placeholder="Password">
      </div>
      <div id="emailHelp" class="form-text">Forgot Password?</div>
    </div>
    
    <div>
      <button type="submit" onclick="location.href='C:\Users\23Z320\Downloads\desiconnect-main\desiconnect-main\Homepage.html'" class="btn btn-primary">Login</button>
    </div>
  </form>
  
</div>

</body>
</html>
