<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<header class="bg-primary text-white p-3 d-flex justify-content-between align-items-center">
    <a href="Homepage.html"><img src="https://i.imgur.com/QFeZEKy.png" alt="Logo" height="50"></a>
    <nav>
        <a href="Homepage.html" class="text-white mx-2">Home</a>
        <a href="cart.html" class="text-white mx-2">Cart</a>
        <a href="login.html" class="text-white mx-2">Login</a>
    </nav>
</header>

    <div class="container mt-5">
        <h2 class="text-center mb-4">Your Shopping Cart</h2>

        <div class="table-responsive">
            <table class="table table-bordered">
                <thead class="table-light">
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th>Actions</th>
                        <th>Customize</th>
                    </tr>
                </thead>
                <tbody id="cartItems">
                   
                    <tr>
                        <td>Product 1</td>
                        <td>$25.00</td>
                        <td>
                            <input type="number" value="1" min="1" class="form-control quantity" data-price="25.00">
                        </td>
                        <td class="total-price">$25.00</td>
                       
                        <td>
                            <button class="btn btn-danger remove-item">Remove</button>
                        </td>
                        <td>
                            <input type="text" class="total-price"  aria-describedby="emailHelp"  placeholder="Leave Message to Seller " >

                        </td>
                    </tr>
                    <tr>
                        <td>Product 2</td>
                        <td>$15.00</td>
                        <td>
                            <input type="number" value="2" min="1" class="form-control quantity" data-price="15.00">
                        </td>
                        <td class="total-price">$30.00</td>
                        <td>
                            <button class="btn btn-danger remove-item">Remove</button>
                        </td>
                        <td>
                            <input type="text" class="total-price"  aria-describedby="emailHelp"  placeholder="Leave Message to Seller " >

                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-between mt-4">
            <h4>Total: $<span id="cartTotal">55.00</span></h4>
            <button class="btn btn-primary">Proceed to Checkout</button>
        </div>
    </div>

    <script>
   
        document.querySelectorAll('.quantity').forEach(function (input) {
            input.addEventListener('input', function () {
                var quantity = input.value;
                var price = parseFloat(input.getAttribute('data-price'));
                var totalPrice = price * quantity;
                
             
                input.closest('tr').querySelector('.total-price').textContent = '$' + totalPrice.toFixed(2);

               
                updateCartTotal();
            });
        });

        document.querySelectorAll('.remove-item').forEach(function (button) {
            button.addEventListener('click', function () {
                button.closest('tr').remove();
                updateCartTotal();
            });
        });

        function updateCartTotal() {
            var total = 0;
            document.querySelectorAll('.total-price').forEach(function (td) {
                total += parseFloat(td.textContent.replace('$', ''));
            });
            document.getElementById('cartTotal').textContent = total.toFixed(2);
        }
    </script>

<footer class="bg-light text-center p-3 mt-5">
    <p>© 2025 DesiConnect | <a href="cart.html">View Cart</a> | <a href="Homepage.html">Browse Products</a></p>
</footer>

</body>

</html>
