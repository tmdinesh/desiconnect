<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DesiConnect Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
        }
        .logo {
            display: block;
            margin: 20px auto;
            width: 150px;
        }
        .center {
            text-align: center;
            margin: auto;
            width: 50%;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .form-control {
            max-width: 100%;
            margin: 10px auto;
        }
        .btn-primary {
            width: 100%;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .footer {
            text-align: center;
            padding: 20px;
            background: #343a40;
            color: white;
            margin-top: 40px;
        }
        .footer a {
            color: #f8d210;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>




<img src="https://i.imgur.com/QFeZEKy.png" alt="Logo of India Post" class="logo">

<div class="center">
    <h2>Seller Login</h2>
    <form>
        <div class="mb-3">
            <label for="SellerId" class="form-label">Seller ID</label>
            <input type="text" class="form-control" id="SellerId" placeholder="Enter your Seller ID" pattern="[0-9]{6}" required>
        </div>
        <div class="mb-3">
            <label for="Password" class="form-label">Password</label>
            <input type="password" class="form-control" id="Password" placeholder="Enter your password" required>
        </div>
        <div class="mb-3 text-center">
            <a href="#">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
</div>

<footer class="footer">
    <p>&copy; 2025 DesiConnect. All rights reserved.</p>
    <p><a href="#">Privacy Policy</a> | <a href="#">Terms of Service</a> | <a href="#">Contact Us</a></p>
</footer>
</body>
</html>
