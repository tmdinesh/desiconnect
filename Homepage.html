<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        .navbar {
            background-color: #ff3f6c;
        }
        .navbar-brand, .nav-link {
            color: white !important;
        }
        .banner {
            background: url('https://source.unsplash.com/1600x600/?fashion') no-repeat center center/cover;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }
        .category-card img {
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">Desi Connect</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Men</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Women</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Kids</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Sale</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="banner text-center">Trending Fashion at Your Fingertips</div>
    
    <div class="container mt-5">
        <h3 class="text-center mb-4">Shop by Category</h3>
        <div class="row">
            <div class="col-md-4">
                <div class="card category-card">
                    <img src="https://source.unsplash.com/400x300/?men-fashion" class="card-img-top" alt="Men">
                    <div class="card-body text-center">
                        <h5 class="card-title">Men</h5>
                        <a href="#" class="btn btn-primary">Shop Now</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card category-card">
                    <img src="https://source.unsplash.com/400x300/?women-fashion" class="card-img-top" alt="Women">
                    <div class="card-body text-center">
                        <h5 class="card-title">Women</h5>
                        <a href="#" class="btn btn-primary">Shop Now</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card category-card">
                    <img src="https://source.unsplash.com/400x300/?kids-fashion" class="card-img-top" alt="Kids">
                    <div class="card-body text-center">
                        <h5 class="card-title">Kids</h5>
                        <a href="#" class="btn btn-primary">Shop Now</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <footer class="mt-5 py-4 bg-dark text-light text-center">
        <p>© 2025 Desi Connect. All rights reserved.</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
