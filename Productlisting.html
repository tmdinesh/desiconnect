<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Product Listings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 1200px;
        }
        .card {
            border-radius: 10px;
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
        }
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .card-img-top {
            height: 200px;
            object-fit: cover;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }
        .btn-custom {
            border-radius: 20px;
            transition: all 0.3s ease-in-out;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        .add-product {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 24px;
            border-radius: 50%;
            padding: 15px 20px;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h2 class="mb-4 text-center">Your Product Listings</h2>

        <!-- Search Bar -->
        <div class="row mb-3 justify-content-center">
            <div class="col-md-6">
                <input type="text" class="form-control" placeholder="Search your products...">
            </div>
        </div>

        <div class="row">
            <!-- Sidebar for Categories -->
            <div class="col-md-3">
                <h4 class="text-center">Categories</h4>
                <ul class="list-group">
                    <li class="list-group-item">Apparel</li>
                    <li class="list-group-item">Accessories</li>
                    <li class="list-group-item">Festivities</li>
                </ul>
            </div>

            <!-- Product Grid -->
            <div class="col-md-9">
                <div class="row">
                    <!-- Product Card 1 -->
                    <div class="col-md-4 mb-4">
                        <div class="card h-100">
                            <img src="https://i.pinimg.com/originals/4c/83/99/4c83999c838df73afd2c0e261c6a8c98.jpg" class="card-img-top" alt="Apparel">
                            <div class="card-body text-center">
                                <h5 class="card-title">Apparel</h5>
                                <p class="card-text">$20</p>
                                <button class="btn btn-warning btn-custom">Edit</button>
                                <button class="btn btn-danger btn-custom">Delete</button>
                            </div>
                        </div>
                    </div>

                    <!-- Product Card 2 -->
                    <div class="col-md-4 mb-4">
                        <div class="card h-100">
                            <img src="https://i.pinimg.com/originals/f4/37/68/f43768caae59430b545b279d892b15aa.jpg" class="card-img-top" alt="Accessories">
                            <div class="card-body text-center">
                                <h5 class="card-title">Accessories</h5>
                                <p class="card-text">$30</p>
                                <button class="btn btn-warning btn-custom">Edit</button>
                                <button class="btn btn-danger btn-custom">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Pagination -->
                <nav>
                    <ul class="pagination justify-content-center">
                        <li class="page-item disabled"><a class="page-link" href="#">Previous</a></li>
                        <li class="page-item active"><a class="page-link" href="#">1</a></li>
                        <li class="page-item"><a class="page-link" href="#">2</a></li>
                        <li class="page-item"><a class="page-link" href="#">3</a></li>
                        <li class="page-item"><a class="page-link" href="#">Next</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- Add Product Button -->
    <a href="add_product.html" class="btn btn-primary add-product">+</a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
