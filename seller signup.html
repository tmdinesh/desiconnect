<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>DesiConnect Signup</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
               <style>
                   body {
                       background-color: #f8f9fa;
                       font-family: Arial, sans-serif;
                   }
                   .container {
                       max-width: 800px;
                       margin: 40px auto;
                       background: white;
                       padding: 20px;
                       border-radius: 10px;
                       box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
                   }
                   .btn-primary {
                       background-color: #007bff;
                       border: none;
                       transition: background-color 0.3s ease;
                   }
                   .btn-primary:hover {
                       background-color: #0056b3;
                   }
               </style>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <style>
  
            img {
              display: block;
              margin-left: auto;
              margin-right: auto;
              width: 20%;
            }
          
            .center {
              text-align: center;
              margin: auto;
              width: 50%;
              border: 3px solid grey;
              padding: 40px;
              border-radius: 8px;
              box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            }
          
          
            .center-block {
              display: block;
              margin: 0 auto;
            }
          
          
            .form-control {
              max-width: 350px;
              margin: 10px auto;
            }
          
            .btn {
              width: 48%;
              margin: 10px 1%;
            }
          
            a {
              display: inline-block;
              margin-top: 20px;
              text-decoration: none;
              color: #007bff;
              font-weight: bold;
            }
          
            a:hover {
              text-decoration: underline;
            }
          </style>
          </head>
          <body>
          
          
          <img src="https://i.imgur.com/QFeZEKy.png" alt="Logo of India Post">
          
          
          <div class="center">
            <form>
              <div class="mb-3">
                <label for="businessname" class="form-label">Business Name (as in GST records)</label>
                <div class="center-block"> 
                  <input type="text" class="form-control" id="businessname" aria-describedby="emailHelp" placeholder="(as in GST/PAN records)" pattern="[A-Z]{50}" title="Invalid Seller ID" required>
                </div>
                    <label for="Email" class="form-label">Email</label>
                <div class="center-block">
                    <input type="email" class="form-control" id="Email" aria-describedby="emailHelp" placeholder="Enter your email" required>
                </div>
                <label for="Address1" class="form-label"> Warehouse Address </label>
                <div class="center-block">
                    <input type="text" class="form-control" id="Address1" aria-describedby="emailHelp" placeholder="Enter your Warehouse Address">
                </div>
                <label for="Address2" class="form-label">Business Address</label>
                <div class="center-block">
                    <input type="text" class="form-control" id="Address2" aria-describedby="emailHelp" placeholder="Enter your Business Address">
                </div>
                
                
                
                <label for="zip-code" class="form-label">Zip Code</label>
                <div class="center-block">
                    <input type="tel" class="form-control" id="zip-code" aria-describedby="emailHelp" placeholder="Enter Your Zip Code" pattern="[1-9]{1}[0-9]{5}">
                </div>
                <label for="Phone" class="form-label">Phone</label>
                <div class="center-block">
                    <input type="tel" class="form-control" id="Phone" aria-describedby="emailHelp" placeholder=" Enter Your Phone" pattern="[6-9]{1}[0-9]{9}">
                </div>      
                <label for="GST" class="form-label">GST</label>
                <div class="center-block">
                    <input type="text" class="form-control"  aria-describedby="emailHelp" id="GST" placeholder="Enter Your GST" pattern="^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$" title="Invalid GST Number.">
                </div>        
               </div>
              <div>
                <button type="submit" class="btn btn-primary">Register</button>
              </div>
            </form>
            
          </div>
          
          </body>
          </html>
